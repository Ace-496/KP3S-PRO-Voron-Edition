    RESTORE_GCODE_STATE NAME=PARKBED

[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
    # Parameters
    {% set z = params.Z|default(10)|int %}                                                   ; z hop amount

    {% if printer['pause_resume'].is_paused|int == 0 %}
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=zhop VALUE={z}                              ; set z hop variable for reference in resume macro
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=etemp VALUE={printer['extruder'].target}    ; set hotend temp variable for reference in resume macro

        SET_FILAMENT_SENSOR SENSOR=FilamentSensor ENABLE=0                                   ; disable filament sensor
        SAVE_GCODE_STATE NAME=PAUSE                                                          ; save current print position for resume
        BASE_PAUSE                                                                           ; pause print
        {% if (printer.gcode_move.position.z + z) < printer.toolhead.axis_maximum.z %}       ; check that zhop doesn't exceed z max
            G91                                                                              ; relative positioning
            G1 Z{z} F900                                                                     ; raise Z up by z hop amount
        {% else %}
            { action_respond_info("Pause zhop exceeds maximum Z height.") }                  ; if z max is exceeded, show message and set zhop value for resume to 0
            SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=zhop VALUE=0
        {% endif %}
        G90                                                                                  ; absolute positioning
        G1 X{printer.toolhead.axis_maximum.x/2} Y{printer.toolhead.axis_minimum.y+5} F6000   ; park toolhead at front center
        SAVE_GCODE_STATE NAME=PAUSEPARK                                                      ; save parked position in case toolhead is moved during the pause (otherwise the return zhop can error)
        M104 S0                                                                              ; turn off hotend
        SET_IDLE_TIMEOUT TIMEOUT=43200                                                       ; set timeout to 12 hours
    {% endif %}

[gcode_macro RESUME]
rename_existing: BASE_RESUME
variable_zhop: 0
variable_etemp: 0
gcode:
    # Parameters
    {% set e = params.E|default(2.5)|int %}                                          ; hotend prime amount (in mm)

    {% if printer['pause_resume'].is_paused|int == 1 %}
        SET_FILAMENT_SENSOR SENSOR=FilamentSensor ENABLE=1                          ; enable filament sensor
        #INITIAL_RGB                                                                    ; reset LCD color
        SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}  ; set timeout back to configured value
        {% if etemp > 0 %}
            M109 S{etemp|int - 20}                                                        ; wait for hotend to heat back up
        {% endif %}
        RESTORE_GCODE_STATE NAME=PAUSEPARK MOVE=1 MOVE_SPEED=100                     ; go back to parked position in case toolhead was moved during pause (otherwise the return zhop can error)
        G91                                                                          ; relative positioning
        M83                                                                          ; relative extruder positioning
        {% if printer[printer.toolhead.extruder].temperature >= printer.configfile.settings.extruder.min_extrude_temp %}
            G1 Z{zhop * -1} E{e} F900                                                ; prime nozzle by E, lower Z back down
        {% else %}
            G1 Z{zhop * -1} F900                                                     ; lower Z back down without priming (just in case we are testing the macro with cold hotend)
        {% endif %}
        {% if etemp > 0 %}
            M104 S{etemp|int}                                                        ; final hotend heating
        {% endif %}
        RESTORE_GCODE_STATE NAME=PAUSE MOVE=1 MOVE_SPEED=60                          ; restore position
        BASE_RESUME                                                                  ; resume print
    {% endif %}

[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
gcode:
    SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout} ; set timeout back to configured value
    CLEAR_PAUSE
    # SDCARD_RESET_FILE
    END_PRINT HOLD_MOTOR=1
    BASE_CANCEL_PRINT

[gcode_macro M600]
gcode:
    #LCDRGB R=0 G=1 B=0  ; Turn LCD green
    PAUSE                ; Pause

[gcode_macro M109]
rename_existing: M99109
gcode:
    #Parameters
    {% set s = params.S|float %}
    
    M104 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}  ; Set hotend temp
    {% if s != 0 %}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={s} MAXIMUM={s+1}   ; Wait for hotend temp (within 1 degree)
    {% endif %}

[gcode_macro M190]
rename_existing: M99190
gcode:
    #Parameters
    {% set s = params.S|float %}

    M140 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}   ; Set bed temp
    {% if s != 0 %}
        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={s-1} MAXIMUM={s+1}  ; Wait for bed temp (within 1 degree)
    {% endif %}

[gcode_macro START_PRINT]
description: "Initialise the print" 

variable_bed_type: "undefined"
variable_last_min_x: 0
variable_last_min_y: 0
variable_last_max_x: 0
variable_last_max_y: 0

gcode: 
    #Parameters
   {% set tH = params.T_HOTEND|default(220)|int %}
   {% set tB = params.T_BED|default(60)|int %}
   {% set tP = params.T_PROBE|default(140)|int %}
   {% set nswait = namespace(wait = params.WAIT|default(0)|float) %}
   {% set bt = params.BED_TYPE|default("not set")|string %}

   {% set all_points = printer.exclude_object.objects | map(attribute='polygon') | sum(start=[]) %}                                # Gather all object points
   {% set bed_mesh_min = printer.configfile.settings.bed_mesh.mesh_min %}                                                          # Get bed mesh min from printer.cfg
   {% set bed_mesh_max = printer.configfile.settings.bed_mesh.mesh_max %}                                                          # Get bed mesh max from printer.cfg
   {% set x_min = all_points | map(attribute=0) | min | default(bed_mesh_min[0]) %}                                                # Set x_min from smallest object x point
   {% set y_min = all_points | map(attribute=1) | min | default(bed_mesh_min[1]) %}                                                # Set y_min from smallest object y point
   {% set x_max = all_points | map(attribute=0) | max | default(bed_mesh_max[0]) %}                                                # Set x_max from largest object x point
   {% set y_max = all_points | map(attribute=1) | max | default(bed_mesh_max[1]) %}                                                # Set y_max from largest object y point
   {% set print_width  = x_max - x_min %}
   {% set print_depth  = y_max - y_min %}

   # GCode 
   CLEAR_PAUSE
   SET_FILAMENT_SENSOR SENSOR=FilamentSensor ENABLE=0
   UPDATE_DELAYED_GCODE ID=kill_fan DURATION=0
   M107                                     ; turn off fan
   G90
   M83
   {% set heatT = tH * 0.7 %}               ; set intial heating temperature
   M104 S{ heatT if heatT < 200 else 200 }
   M190 S{ tB }                              ; wait for bed temperature
   {% if print_width > 150 or print_depth > 150 %}
     M190 S{ tB + 5 }
     {% set nswait.wait = nswait.wait + 60 %}
   {% endif %}
   M106 S255                                 ; set full fan speed
   M104 S{ tP }                              ; set probing temperature
   {% if nswait.wait > 0 %}                         ; wait for period
    G4 P{ nswait.wait * 1000 }
   {% endif %}
   SET_VELOCITY_LIMIT ACCEL=10000
   _CG28                                      ; conditional homing
   {% if params.PROBE_DEVIATION|default(0)|int == 1 %}            ; test probe accuracy
    PROBE_ACCURACY
   {% endif %}
   {% set ns = namespace(reuse = true) %}
   {% if x_min < printer["gcode_macro START_PRINT"].last_min_x %}{% set ns.reuse = false %}{% endif %}
   {% if y_min < printer["gcode_macro START_PRINT"].last_min_y %}{% set ns.reuse = false %}{% endif %}
   {% if x_max > printer["gcode_macro START_PRINT"].last_max_x %}{% set ns.reuse = false %}{% endif %}
   {% if y_max > printer["gcode_macro START_PRINT"].last_max_y %}{% set ns.reuse = false %}{% endif %}
   {% if ns.reuse and bt == printer["gcode_macro START_PRINT"].bed_type %}
     BED_MESH_PROFILE LOAD=kamplast
   {% else %}
     BED_MESH_CALIBRATE                        ; probe bed mesh
     BED_MESH_PROFILE SAVE=kamplast
     SET_GCODE_VARIABLE MACRO=START_PRINT VARIABLE=last_min_x VALUE={x_min}
     SET_GCODE_VARIABLE MACRO=START_PRINT VARIABLE=last_min_y VALUE={y_min}
     SET_GCODE_VARIABLE MACRO=START_PRINT VARIABLE=last_max_x VALUE={x_max}
     SET_GCODE_VARIABLE MACRO=START_PRINT VARIABLE=last_max_y VALUE={y_max}
     SET_GCODE_VARIABLE MACRO=START_PRINT VARIABLE=bed_type VALUE='"{bt}"'
   {% endif %}
   M104 S{ tH }                              ; start final heating
   SET_VELOCITY_LIMIT ACCEL=1000
   SMART_PARK                                ; park for heating
   M107                                      ; stop fan
   M109 S{ tH }                              ; wait for hotend
   SET_FILAMENT_SENSOR SENSOR=FilamentSensor ENABLE=1
   G92 E0                                    ; reset extruder
   LINE_PURGE                                ; purge extruder
   SKEW_PROFILE LOAD=calilantern_skew_profile

[gcode_macro END_PRINT]
description: "End the print"
gcode: 
  #Parameters
  {% set fanWait = params.FAN_WAIT|default(300)|int %}

  #gcode
  G90
  SET_SKEW CLEAR=1
  SET_VELOCITY_LIMIT ACCEL=10000
  M104 S{ printer.configfile.settings.extruder.min_extrude_temp }    ;starting winding down extruder
  G1 E-8.0 F2100                                                     ; retract
  G1 X0 Z{ [printer.toolhead.position.z + 20, printer.toolhead.axis_maximum.z] | min } F3200 ; move print head up & retract filament
  G92 E0                                                             ; reset extruder
  G1 E-12 F1800
  G1 Y{ printer.toolhead.axis_maximum.y - 20 } F1200                                                      ;present print
  M106 S255                                                          ; max fan
  M104 S0                                                            ; turn off temperature
  {% if params.KEEP_BED|default(0)|int != 1 %}
  M140 S0                                                            ; turn off heatbed
  {% endif %}
  {% if params.HOLD_MOTOR|default(0)|int == 0 %}
  M84                                                                ; disable motors
  {% endif %}
  UPDATE_DELAYED_GCODE ID=kill_fan DURATION={ fanWait }

