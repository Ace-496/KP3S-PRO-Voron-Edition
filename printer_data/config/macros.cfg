[gcode_macro ANNEAL_PRINT]
description: "Anneal a printed part on the bed"
gcode:
    {% set start_temp = params.START|default(60)|float %}
    {% set end_temp = params.END|default(110)|float %}
    {% set duration_hr = params.DURATION|default(12)|float %}
    {% set delta = end_temp - start_temp %}
    {% set total_time_ms = duration_hr * 60 * 60 * 1000 %}
    {% set phase1_time = total_time_ms * 0.05 %}
    {% set phase2_time = total_time_ms * 0.10 %}
    {% set phase3_time = total_time_ms * 0.10 %}
    {% set phase4_time = total_time_ms * 0.15 %}
    {% set phase5_time = total_time_ms * 0.10 %}
    {% set phase6_time = total_time_ms * 0.30 %}
    {% set phase7_time = total_time_ms * 0.20 %}
    {% set hold1_temp = start_temp + delta * 0.25 %}
    {% set hold2_temp = start_temp + delta * 0.5 %}
    {% set msg = "Anneal: Begin - start=" ~ start_temp|string ~ ", end=" ~ end_temp|string ~ ", duration=" ~ duration_hr|string ~ "h" %}
    M118 {msg}

    {% set msg = "Anneal: Phase 1 - hold at " ~ start_temp|string ~ "C" %}
    M118 {msg}
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={start_temp}
    G4 P{phase1_time|int}

    {% set msg = "Anneal: Phase 2 - ramp to " ~ hold1_temp|string ~ "C" %}
    M118 {msg}
    {% set steps = (hold1_temp - start_temp)|int %}
    {% set delay = phase2_time / steps %}
    {% for t in range(start_temp|int + 1, hold1_temp|int + 1) %}
        SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={t}
        G4 P{delay|int}
    {% endfor %}

    {% set msg = "Anneal: Phase 3 - hold at " ~ hold1_temp|string ~ "C" %}
    M118 {msg}
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={hold1_temp}
    G4 P{phase3_time|int}

    {% set msg = "Anneal: Phase 4 - ramp to " ~ hold2_temp|string ~ "C" %}
    M118 {msg}
    {% set steps = (hold2_temp - hold1_temp)|int %}
    {% set delay = phase4_time / steps %}
    {% for t in range(hold1_temp|int + 1, hold2_temp|int + 1) %}
        SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={t}
        G4 P{delay|int}
    {% endfor %}

    {% set msg = "Anneal: Phase 5 - hold at " ~ hold2_temp|string ~ "C" %}
    M118 {msg}
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={hold2_temp}
    G4 P{phase5_time|int}

    {% set msg = "Anneal: Phase 6 - ramp to " ~ end_temp|string ~ "C" %}
    M118 {msg}
    {% set steps = (end_temp - hold2_temp)|int %}
    {% set delay = phase6_time / steps %}
    {% for t in range(hold2_temp|int + 1, end_temp|int + 1) %}
        SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={t}
        G4 P{delay|int}
    {% endfor %}

    {% set msg = "Anneal: Phase 7 - final hold at " ~ end_temp|string ~ "C" %}
    M118 {msg}
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={end_temp}
    G4 P{phase7_time|int}

    M118 Anneal: Complete. Turning off systems.
    TURN_OFF_HEATERS
    M106 S0
    M84

[gcode_macro CONTROLLED_COOL]
description: "Controlled cool down after annealing"
gcode:
    {% set start_temp = params.START_TEMP|default(110)|float %}
    {% set end_temp = params.END_TEMP|default(40)|float %}
    {% set duration_hr = params.DURATION_HR|default(2)|float %}
    {% set duration_ms = duration_hr * 3600 * 1000 %}
    {% set delta = start_temp - end_temp %}
    {% if delta <= 0 %}
      M118 Cooling skipped: start_temp must be greater than end_temp.
      RESPOND PREFIX=ERROR MSG="Invalid temperatures for cooling."
      RETURN
    {% endif %}
    {% set steps = delta|int %}
    {% set step_delay = duration_ms / steps %}

    M118 Cooling: Start from {start_temp}°C to {end_temp}°C over {duration_hr} hours

    {% for i in range(1, steps + 1) %}
        {% set t = start_temp - i %}
        SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={t}
        G4 P{step_delay|round|int}
    {% endfor %}

    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={end_temp}
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={end_temp - 1} MAXIMUM={end_temp + 1}
    M118 Cooling: Final hold complete at {end_temp}°C

    M118 Cooling complete. Shutting down.
    TURN_OFF_HEATERS
    M106 S0
    M84

[gcode_macro CENTER_PROBE]
description: "Centre the probe on the bed"
gcode:
    # Get bed dimensions
    {% set bed_x_max = printer.configfile.settings.stepper_x.position_max | float %}
    {% set bed_y_max = printer.configfile.settings.stepper_y.position_max | float %}
    
    # Get probe offsets
    {% set x_offset = printer.configfile.settings.bltouch.x_offset | float %}
    {% set y_offset = printer.configfile.settings.bltouch.y_offset | float %}
    
    # Calculate the center point for the nozzle so the probe lands in the middle
    {% set target_x = (bed_x_max / 2) - x_offset %}
    {% set target_y = (bed_y_max / 2) - y_offset %}
    
    # Move the toolhead
    G90
    G1 X{target_x} Y{target_y} F3000

[gcode_macro _CG28]
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% else %}
        G28 Z
    {% endif %}

[gcode_macro DUMP_VARIABLES]
gcode:
    {% set filter_name = params.NAME|default('')|string|lower %}
    {% set filter_value = params.VALUE|default('')|string|lower %}
    {% set show_cfg = params.SHOW_CFG|default(0)|int %}
    
    {% set out = [] %}

    {% for key1 in printer %}
        {% for key2 in printer[key1] %}
            {% if (show_cfg or not (key1|lower == 'configfile' and key2|lower in ['config', 'settings'])) and (filter_name in key1|lower or filter_name in key2|lower) and filter_value in printer[key1][key2]|string|lower %}
                {% set dummy = out.append("printer['%s'].%s = %s" % (key1, key2, printer[key1][key2])) %}
            {% endif %}
        {% else %}
            {% if filter_name in key1|lower and filter_value in printer[key1]|string|lower %}
                {% set dummy = out.append("printer['%s'] = %s" % (key1, printer[key1])) %}
            {% endif %}
        {% endfor %}
    {% endfor %}
    
    {action_respond_info(out|join("\n"))}

[gcode_macro GET_VARIABLE]
gcode:
    {% set names = (params.NAME).split('.')|list %}
    {% set join = (params.JOIN)|default(1)|int %}
    
    {% set _dummy0 = namespace( break = 0 ) %}
    {% set _dummy1 = namespace( out = printer[names|first] ) %}
    
    {% for name in names if _dummy0.break == 0 %}
        {% if loop.index > 1 %}
            {% if name in _dummy1.out %}
                {% set _dummy1.out = _dummy1.out[name] %}
            {% elif name[0] in '0123456789' and _dummy1.out is iterable and _dummy1.out is not string and _dummy1.out is not mapping and _dummy1.out|length > name[0]|int %}
                {% set _dummy1.out = _dummy1.out[name|int] %}
            {% else %}
                {% set _dummy0.break = loop.index0 %}
            {% endif %}
        {% endif %}
    {% endfor %}
    
    {% if _dummy1.out is boolean %}
        { action_respond_info('Type: boolean') }
    {% elif _dummy1.out is float %}
        { action_respond_info('Type: float') }
    {% elif _dummy1.out is integer %}
        { action_respond_info('Type: integer') }
    {% elif _dummy1.out is mapping %}
        { action_respond_info('Type: mapping') }
    {% elif _dummy1.out is string %}
        { action_respond_info('Type: string') }
    {% elif _dummy1.out is iterable %}
        { action_respond_info('Type: iterable') }
    {% elif _dummy1.out is none %}
        { action_respond_info('Type: none') }
    {% elif _dummy1.out is undefined %}
        { action_respond_info('Type: undefined') }
    {% elif _dummy1.out is callable %}
        { action_respond_info('Type: callable') }
    {% else %}
        { action_respond_info('Type: unknown') }
    {% endif %}
    
    {% if join and _dummy1.out is iterable and _dummy1.out is not string and _dummy1.out is not mapping %}
        { action_respond_info('%s' % _dummy1.out|join("\n")) }
    {% else %}
        { action_respond_info('%s' % _dummy1.out) }
    {% endif %}
    
    {% if _dummy0.break != 0 %}
        { action_respond_info('"printer.%s" does not contain "%s"!' % (names[0:_dummy0.break]|join('.'), names[_dummy0.break])) }
    {% endif %}

# Park front center
[gcode_macro PARKFRONT]
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                           ; home if not already homed
    {% endif %}
    SAVE_GCODE_STATE NAME=PARKFRONT
    G90                               ; absolute positioning
    G0 X{printer.toolhead.axis_maximum.x/2} Y{printer.toolhead.axis_minimum.y+5} Z{printer.toolhead.axis_maximum.z/2} F6000        
    RESTORE_GCODE_STATE NAME=PARKFRONT

# Park front center, but low down.
[gcode_macro PARKFRONTLOW]
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                           ; home if not already homed
    {% endif %}
    SAVE_GCODE_STATE NAME=PARKFRONT
