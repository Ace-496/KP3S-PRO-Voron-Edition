[include fluidd.cfg]
[include mainsail.cfg]
# [include bedmesh.cfg]
[include test_speed.cfg]
[include macros.cfg]
[include KAMP_Settings.cfg]
# [include adxlmcu.cfg]
[virtual_sdcard]
path: /home/dietpi/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[mcu]
# serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
# serial: /dev/serial/by-id/usb-Klipper_rp2040_5044505938B2C71C-if00
serial: /dev/serial/by-id/usb-Silicon_Labs_CP2102_USB_to_UART_Bridge_Controller_0001-if00-port0
# serial: /dev/ttyAMA0

restart_method: command
# baud: 250000

[force_move]
enable_force_move: true

[stepper_x]
step_pin: gpio11
dir_pin: !gpio10
enable_pin: !gpio12
full_steps_per_rotation: 200
microsteps: 64
rotation_distance: 40
endstop_pin: ^!gpio25 #^!gpio4
# endstop_pin: tmc2209_stepper_x:virtual_endstop
# homing_retract_dist: 0
position_endstop: 0
position_max: 204.5
homing_speed: 50
second_homing_speed: 20
position_min: -1
homing_retract_dist: 0

[tmc2209 stepper_x]
uart_pin: gpio9
tx_pin: gpio8
uart_address: 0
run_current: 1.2 #0.8
interpolate: False             # Disable hardware interpolation
# hold_current: 0.6
# stealthchop_threshold: 999999
# diag_pin: ^gpio4
# driver_SGTHRS: 100

[stepper_y]
step_pin: gpio6
dir_pin: gpio5
enable_pin: !gpio7
full_steps_per_rotation: 200
microsteps: 64
rotation_distance: 40
endstop_pin: ^!gpio3
# endstop_pin: tmc2209_stepper_y:virtual_endstop
# homing_retract_dist: 0
position_endstop: 0
position_max: 206
homing_speed: 50
second_homing_speed: 20
homing_retract_dist: 0
position_min: -1

[tmc2209 stepper_y]
uart_pin: gpio9
tx_pin: gpio8
uart_address: 2
run_current: 1.2 #0.9
interpolate: False             # Disable hardware interpolation
# hold_current: 0.6
# stealthchop_threshold: 999999
# diag_pin: ^gpio3
# driver_SGTHRS: 100

[stepper_z]
step_pin: gpio19
dir_pin: !gpio28
enable_pin: !gpio2
full_steps_per_rotation: 200
microsteps: 64 #32
rotation_distance: 8
# endstop_pin: ^gpio25 # disable to use BLTouch
endstop_pin: probe:z_virtual_endstop  # enable to use BLTouch
# position_endstop: -0.35 # disable to use BLTouch
position_max: 200
position_min: -4.5 # enable to use BLTouch
# homing_speed: 5
homing_speed: 20
# second_homing_speed: 2
second_homing_speed: 10
# homing_retract_dist: 0
#   Distance to backoff (in mm) before homing a second time during
#   homing. Set this to zero to disable the second home. The default
#   is 5mm.

[tmc2209 stepper_z]
uart_pin: gpio9
tx_pin: gpio8
uart_address: 1
run_current: 1 #0.7
interpolate: True
# hold_current: 0.500
stealthchop_threshold: 999999

[bltouch] # enable for BLTouch
sensor_pin: ^gpio22
control_pin: gpio29
x_offset: -24.4 #30.5 #27.7
y_offset: 0 #3.5
#z_offset: 0
speed: 20
lift_speed: 20
# pin_move_time: 0.05
pin_move_time: 0.1
samples: 2
samples_result: median
# stow_on_each_sample: false
# probe_with_touch_mode: true
# pin_up_reports_not_triggered: True
#   Set if the BLTouch consistently reports the probe in a "not
#   triggered" state after a successful "pin_up" command. This should
#   be True for all genuine BLTouch devices. Read the directions in
#   docs/BLTouch.md before setting this to False. The default is True.
# pin_up_touch_mode_reports_triggered: True
#   Set if the BLTouch consistently reports a "triggered" state after
#   the commands "pin_up" followed by "touch_mode". This should be
#   True for all genuine BLTouch devices. Read the directions in
#   docs/BLTouch.md before setting this to False. The default is True.
samples_tolerance_retries: 4
# stow_on_each_sample: False
sample_retract_dist: 4
samples_tolerance: 0.05 #0.025

# [probe]
# pin: ^gpio22
# x_offset: 0.0
# y_offset: 0.0
# #z_offset: 0
# speed: 2
# samples: 2
# sample_retract_dist: 1.2
# lift_speed: 10
# samples_result: median
# samples_tolerance: 0.0100
# samples_tolerance_retries: 3

[safe_z_home]
# home_xy_position: 69,96
# home_xy_position: 100,100
home_xy_position: 124.4, 100 #69.5, 96.5 #72.3
z_hop: 10

[bed_mesh]
speed: 500
# horizontal_move_z: 2.5
# horizontal_move_z: 4
horizontal_move_z: 7
#mesh_min: 30, 3       #!!min and max co-ords are based on the probes location not the nozzle!!
# mesh_max: 196, 199 
# mesh_min: 0, 0       #!!min and max co-ords are based on the probes location not the nozzle!!
#mesh_max: 200, 200 
probe_count:10,10 #this is the number of probing points on X then Y axis
mesh_min: 0, 0
mesh_max: 180, 200
mesh_pps: 8,8
algorithm: bicubic
fade_start: 1
fade_end: 10
# fade_target: 0
split_delta_z: .01
bicubic_tension: 0.5 #0.2
move_check_distance: 3
# zero_reference_position: 100, 100

[thermistor Kingroon_B3950]
temperature1: 25.0
resistance1: 103180.0
temperature2: 150.0
resistance2: 1366.2
temperature3: 250.0
resistance3: 168.6

[extruder]
step_pin: gpio14
dir_pin: !gpio13
enable_pin: !gpio15
full_steps_per_rotation: 200
microsteps: 64 #16
gear_ratio: 3:1
rotation_distance: 23.335
#24.174
filament_diameter: 1.750
nozzle_diameter: 0.400
heater_pin: gpio23
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: gpio27
#control: pid
#pid_kp: 27.057
#pid_ki: 1.171
#pid_kd: 156.254
min_temp: 0
max_temp: 300
min_extrude_temp: 170
max_extrude_only_distance: 101
pressure_advance: 0.045
max_extrude_cross_section: 100
pwm_cycle_time: 0.100

[tmc2209 extruder]
uart_pin: gpio9
tx_pin: gpio8
uart_address: 3
run_current: 0.7 #0.550
# hold_current: 0.500
# stealthchop_threshold: 999999
interpolate: True

[heater_bed]
heater_pin: gpio21
sensor_type: Generic 3950
sensor_pin: gpio26
#control: pid
#pid_kp: 61.779
#pid_ki: 1.572
#pid_kd: 606.980
min_temp: 0
max_temp: 130
pwm_cycle_time: 0.3

[fan]
pin: gpio20
kick_start_time: 0.6
cycle_time: 0.15
shutdown_speed: 0
# hardware_pwm: false

[heater_fan heatbreak_cooling_fan]
pin: gpio18
heater: extruder
heater_temp: 50.0
kick_start_time: 0.6
cycle_time: 0.15
fan_speed: 1.0
shutdown_speed: 1

# [heater_fan controller_fan]
# pin: gpio17
# heater: heater_bed
# heater_temp: 45.0

[controller_fan my_controller_fan]
pin: gpio17
stepper: stepper_x, stepper_y, stepper_z, extruder
heater: extruder, heater_bed
idle_timeout: 60


# [temperature_fan mcu_fan]
# pin: PB0
# sensor_type: temperature_mcu
# min_temp: 10
# max_temp: 70
# cycle_time: 0.010
# control: watermark

[printer]
kinematics: cartesian
max_velocity: 1000
max_accel: 10000
max_z_velocity: 25
max_z_accel: 100
# max_accel_to_decel: 999999
square_corner_velocity: 5 #8
minimum_cruise_ratio: 0.0

# [static_digital_output display_reset]
# pins: !PC6, !PD13

[filament_switch_sensor FilamentSensor]
pause_on_runout: True
runout_gcode:
    # M118 Starting filament change
    #G0 X0 Y200 E-100
    #M600
insert_gcode:
switch_pin: ^gpio16
event_delay: 5.0
pause_delay: 0.5

[temperature_sensor MCU]
sensor_type: temperature_mcu
sensor_mcu: mcu

[verify_heater extruder]
max_error: 120
check_gain_time: 20
hysteresis: 5
heating_gain: 2

[verify_heater heater_bed]
max_error: 120
check_gain_time: 120 #default 60
hysteresis: 5
heating_gain: 1

[input_shaper]
shaper_freq_x: 48.2
shaper_type_x: ei
shaper_freq_y: 43.0
shaper_type_y: ei
#original
# shaper_freq_x: 54.4
# shaper_type_x: 2hump_ei
# shaper_freq_y: 71
# shaper_type_y: 2hump_ei

[exclude_object]

[skew_correction] 

[gcode_arcs]
resolution: 0.05
#   An arc will be split into segments. Each segment's length will
#   equal the resolution in mm set above. Lower values will produce a
#   finer arc, but also more work for your machine. Arcs smaller than
#   the configured value will become straight lines. The default is
#   1mm.

[idle_timeout]
gcode:
    TURN_OFF_HEATERS
    M84
#   A list of G-Code commands to execute on an idle timeout. See
#   docs/Command_Templates.md for G-Code format. The default is to run
#   "TURN_OFF_HEATERS" and "M84".
timeout: 60000

[bed_screws]
#need calibration
screw1: 20,20
screw2: 190,20
screw3: 190,190
screw4: 20,190

[neopixel board_rgb]
pin: gpio24
chain_count: 1
color_order: GRB
initial_RED: 0.3
initial_GREEN: 0.3
initial_BLUE: 0.3

[delayed_gcode kill_fan]
gcode:
    M107

[firmware_retraction]
retract_length: 0.4
retract_speed: 40
unretract_extra_length: 0
unretract_speed: 35

